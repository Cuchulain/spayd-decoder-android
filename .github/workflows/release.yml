name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Prepare artifact
        id: artifact
        run: |
          mkdir -p out
          REF_NAME="${GITHUB_REF_NAME}"
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            REF_NAME="dev-${GITHUB_SHA::7}"
          fi
          APK_NAME="spayd-decoder-${REF_NAME}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "out/${APK_NAME}"
          echo "apk_path=out/${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}"   >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.apk_name }}
          path: ${{ steps.artifact.outputs.apk_path }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.apk_path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## SPAYD dekodér ${{ github.ref_name }}

            Stáhni `${{ steps.artifact.outputs.apk_name }}` níže a nainstaluj na zařízení s Androidem 7.0+ (zapni "Instalace z neznámých zdrojů").

            Sestaveno jako **debug APK** (podepsáno Android debug klíčem).
