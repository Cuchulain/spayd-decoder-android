name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Missing KEYSTORE_BASE64 secret"; exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Prepare artifact
        id: artifact
        run: |
          mkdir -p out
          REF_NAME="${GITHUB_REF_NAME}"
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            REF_NAME="dev-${GITHUB_SHA::7}"
          fi
          APK_NAME="spayd-decoder-${REF_NAME}.apk"
          cp app/build/outputs/apk/release/app-release.apk "out/${APK_NAME}"
          echo "apk_path=out/${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}"   >> "$GITHUB_OUTPUT"

      - name: Cleanup keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.apk_name }}
          path: ${{ steps.artifact.outputs.apk_path }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.apk_path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## SPAYD dekodér ${{ github.ref_name }}

            Stáhni `${{ steps.artifact.outputs.apk_name }}` níže a nainstaluj na zařízení s Androidem 7.0+ (zapni "Instalace z neznámých zdrojů").

            Podepsáno vlastním release klíčem (R8 minifikace zapnuta).
